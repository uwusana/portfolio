<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upasana's Studio</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/hero.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">
    <div class="logo">
        <img src="assets/images/image.png" alt="logo" >
    </div>

    <div class="nav">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>

</nav>


<!-- HERO -->

<section id="home" class="hero">
    <div class="hero-content">
        <div class="hero-logo">
            <img src="assets/images/main-logo.png" class="intro-logo">
        </div>

        <a href="assets/cv/Upasana_CV.pdf" download class="cv-button">
        Download CV
        </a>

        <div class="stickers">
            <img src="assets/images/stickers/bunny.png" class="sticker s1">

            <img src="assets/images/stickers/smiski.png" class="sticker s2">

            <img src="assets/images/stickers/miffy.png" class="sticker s3">

            <img src="assets/images/stickers/cat.png" class="sticker s4">
        </div>
    </div>

    
</section>

<!-- image stack -->

<div class="photo-stack">

<img src="assets/images/photos/p1.jpg" class="card">
<img src="assets/images/photos/p2.jpg" class="card">
<img src="assets/images/photos/p3.jpg" class="card">

</div>
<!-- TECH STACK -->

<section class="tech-section reveal">

<div class="tech" data-tech="React">
<img src="assets/images/tech/react.png">
</div>

<div class="tech" data-tech="JavaScript">
<img src="assets/images/tech/js.png">
</div>

<div class="tech" data-tech="Java">
<img src="assets/images/tech/java.png">
</div>

</section>


<!-- PROJECTS (GAMEBOY) -->

<section id="projects" class="reveal">

<div class="gameboy">

<img id="projectImage" src="assets/images/projects/project1.png">

<div class="buttons">

<button id="btnA">A</button>
<button id="btnB">B</button>

</div>

</div>

</section>


<script src="js/main.js"></script>
<script src="js/scrollReveal.js"></script>
<script src="js/cursorSparkle.js"></script>
<script src="js/imageStack.js"></script>
<script src="js/gameboyProjects.js"></script>

</body>
</html>
